name: Automated Real Estate Blog Pipeline

on:
  repository_dispatch:
    types: [trigger_pipeline]
    # This line means: run this workflow when n8n sends the trigger_pipeline signal

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    # GitHub provides this free server automatically
    permissions:
      contents: write
      # This allows the server to save new articles back to your repository

    steps:
      - name: Download Your Repository Files
        uses: actions/checkout@v4
        # This copies all your files onto the temporary server

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Script Dependencies
        run: npm install
        # This installs axios, cheerio, and the Groq SDK

      - name: Run the Blog Agent Script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # This securely passes your Groq API key to the script
        run: node agent.js

      - name: Save the New Article Back to Repository
        run: |
          git config --global user.name 'Edmund Blog Automation'
          git config --global user.email 'agent@edmundblog.local'
          git add published_posts/
          git commit -m "Auto-published blog post: $(date +'%Y-%m-%d')"
          git push
          # This saves the new article into your repository automatically
