<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edmund Lim | Read Article</title>
    <!-- Tailwind CSS CDN for premium design layouts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for professional modern iconography -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased selection:bg-blue-500 selection:text-white">

    <!-- Header Navigation Section -->
    <header class="bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 h-20 flex items-center justify-between">
            <a href="index.html" class="inline-flex items-center text-sm font-semibold text-blue-600 hover:text-blue-700 group transition-colors">
                <i class="fa-solid fa-arrow-left mr-2 transform group-hover:-translate-x-1 transition-transform"></i> Back to All Insights
            </a>
            
            <div class="w-10 h-10 rounded-full overflow-hidden border border-slate-200">
                <img src="366373.jpg" alt="Edmund Lim" class="w-full h-full object-cover" onerror="this.src='https://images.unsplash.com/photo-1560518883-ce09059eeffa?auto=format&fit=crop&w=150&q=80'">
            </div>
        </div>
    </header>

    <!-- Main Content Presentation Layout -->
    <main class="max-w-3xl mx-auto px-4 py-12 sm:py-16">
        <article class="bg-white border border-slate-100 rounded-3xl overflow-hidden shadow-sm space-y-0">
            
            <!-- Dynamic Post Banner Image Container -->
            <div class="h-64 sm:h-96 w-full bg-slate-900 relative">
                <img id="post-image" src="" alt="Article Visual Banner" class="w-full h-full object-cover hidden">
                <div id="image-loader" class="absolute inset-0 flex items-center justify-center text-slate-700 bg-slate-100">
                    <i class="fa-solid fa-spinner fa-spin text-xl text-blue-600"></i>
                </div>
            </div>

            <div class="p-6 sm:p-12 space-y-8">
                <!-- Meta Header Data Block -->
                <div class="space-y-4 border-b border-slate-100 pb-6">
                    <span class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-xs font-semibold uppercase tracking-wider" id="post-category">Market Update</span>
                    <h1 class="text-3xl sm:text-4xl font-bold tracking-tight text-slate-950 leading-tight" id="post-title">Loading Article Content...</h1>
                    <div class="flex items-center text-slate-400 text-xs font-medium space-x-2">
                        <span id="post-date"><i class="fa-regular fa-calendar mr-1"></i> Syncing...</span>
                        <span>•</span>
                        <span><i class="fa-regular fa-clock mr-1"></i> 5 min read</span>
                    </div>
                </div>

                <!-- Main Body Content Area -->
                <div id="post-content" class="text-slate-700 leading-relaxed space-y-6 font-light text-base sm:text-lg prose prose-slate max-w-none">
                    <div class="text-center py-12 text-slate-300">
                        <i class="fa-solid fa-circle-notch fa-spin text-3xl text-blue-600 mb-4"></i>
                        <p class="text-slate-400 text-sm font-normal">Assembling analysis structure logs...</p>
                    </div>
                </div>
            </div>
            
        </article>
    </main>

    <!-- Clean Portfolio Tailored Footer Layer -->
    <footer class="bg-slate-950 text-slate-100 pt-16 pb-12 px-4 sm:px-6 lg:px-8 border-t border-slate-900 mt-24">
        <div class="max-w-4xl mx-auto">
            <div class="flex flex-col sm:flex-row items-center text-center sm:text-left gap-4 pb-12 border-b border-white/5">
                <div class="w-16 h-16 rounded-full overflow-hidden border border-white/10 mx-auto sm:mx-0">
                    <img src="366373.jpg" alt="Edmund Lim" class="w-full h-full object-cover" onerror="this.src='https://images.unsplash.com/photo-1560518883-ce09059eeffa?auto=format&fit=crop&w=150&q=80'">
                </div>
                <div>
                    <h3 class="text-xl font-bold tracking-tight text-white">Edmund Lim</h3>
                    <p class="text-sm text-slate-400">Real estate Enthusiast</p>
                </div>
            </div>

            <div class="pt-12 grid grid-cols-1 sm:grid-cols-2 gap-6 text-sm text-slate-400">
                <div class="space-y-3">
                    <p class="font-semibold text-white tracking-wider uppercase text-xs">Direct Contact Channels</p>
                    <a href="tel:+6589179878" class="flex items-center space-x-3 hover:text-white transition-colors group">
                        <i class="fa-solid fa-phone text-slate-500 group-hover:text-blue-400"></i>
                        <span>+65 89179878</span>
                    </a>
                    <a href="mailto:Edmund.initiative@gmail.com" class="flex items-center space-x-3 hover:text-white transition-colors group">
                        <i class="fa-solid fa-envelope text-slate-500 group-hover:text-blue-400"></i>
                        <span>Edmund.initiative@gmail.com</span>
                    </a>
                </div>
                <div class="sm:text-right flex flex-col justify-end space-y-2 text-xs text-slate-500">
                    <p>&copy; 2026 Edmund Lim Initiative. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>

    <!-- Query Parser Engine Details -->
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');

        fetch('blogs.json')
            .then(res => res.json())
            .then(blogs => {
                const post = blogs.find(b => b.id == postId);
                if(post) {
                    document.title = `${post.title} | Edmund Lim`;
                    document.getElementById('post-title').innerText = post.title;
                    document.getElementById('post-category').innerText = post.category || "Market Update";
                    document.getElementById('post-date').innerHTML = `<i class="fa-regular fa-calendar mr-1"></i> Published ${post.date}`;
                    
                    // Render Image Asset cleanly
                    const imgElement = document.getElementById('post-image');
                    imgElement.src = post.image || "https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?auto=format&fit=crop&w=1200&q=80";
                    imgElement.classList.remove('hidden');
                    document.getElementById('image-loader').classList.add('hidden');
                    
                    // Format newline strings safely into HTML text paragraph structures
                    const formattedHtml = post.content
                        .split('\n\n')
                        .map(p => {
                            let text = p.trim();
                            if (text.startsWith('###')) {
                                return `<h3 class="text-xl font-bold text-slate-900 mt-6 mb-2 tracking-tight">${text.replace(/###/g, '').trim()}</h3>`;
                            } else if (text.startsWith('##')) {
                                return `<h2 class="text-2xl font-bold text-slate-950 mt-8 mb-3 tracking-tight">${text.replace(/##/g, '').trim()}</h2>`;
                            } else if (text.startsWith('#')) {
                                return ``; // Filter out duplicate primary headings from body frame content
                            } else if (text.startsWith('-') || text.startsWith('*')) {
                                const listItems = text.split(/\n[\-\*]\s/).map(li => `<li class="ml-4 list-disc font-light mb-1">${li.replace(/^[\-\*]\s/, '')}</li>`).join('');
                                return `<ul class="space-y-1 my-4">${listItems}</ul>`;
                            }
                            return `<p class="mb-4 text-slate-700 leading-relaxed font-light">${text}</p>`;
                        })
                        .join('');
                        
                    document.getElementById('post-content').innerHTML = formattedHtml;
                } else {
                    document.getElementById('post-title').innerText = "Article Log Profile Missing";
                    document.getElementById('post-content').innerHTML = `<p class="text-slate-500 text-center py-12">The requested analysis entry reference is unavailable inside the dynamic data registry indexing matrix.</p>`;
                    document.getElementById('image-loader').innerHTML = `<i class="fa-solid fa-triangle-exclamation text-xl text-amber-500"></i>`;
                }
            })
            .catch(err => {
                console.error("Critical entry routing issue:", err);
                document.getElementById('post-title').innerText = "Error Processing Request";
            });
    </script>
</body>
</html>
