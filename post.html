<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real estate Enthusiast | Article Reader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased selection:bg-blue-500 selection:text-white">

    <header class="bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-50">
        <div class="max-w-3xl mx-auto px-4 h-20 flex items-center justify-between">
            <a href="index.html" class="inline-flex items-center text-sm font-semibold text-blue-600 hover:text-blue-700 group transition-colors">
                <i class="fa-solid fa-arrow-left mr-2 transform group-hover:-translate-x-1 transition-transform"></i> Back to Homepage
            </a>
            <div class="w-10 h-10 rounded-full overflow-hidden border border-slate-200">
                <img src="366373.jpg" alt="Edmund Lim" class="w-full h-full object-cover" onerror="this.src='https://images.unsplash.com/photo-1560518883-ce09059eeffa?auto=format&fit=crop&w=150&q=80'">
            </div>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-4 py-12 sm:py-16">
        <article class="bg-white border border-slate-100 rounded-3xl overflow-hidden shadow-sm">
            <div class="h-64 sm:h-96 w-full bg-slate-900 relative">
                <img id="post-image" src="" alt="Article Visual Banner" class="w-full h-full object-cover hidden opacity-90">
                <div id="image-loader" class="absolute inset-0 flex items-center justify-center text-slate-700 bg-slate-100">
                    <i class="fa-solid fa-spinner fa-spin text-xl text-blue-600"></i>
                </div>
            </div>

            <div class="p-6 sm:p-12 space-y-6">
                <div class="space-y-4 border-b border-slate-100 pb-6">
                    <span class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-xs font-semibold uppercase tracking-wider" id="post-category">Market Update</span>
                    <h1 class="text-2xl sm:text-3xl font-bold tracking-tight text-slate-950 leading-tight" id="post-title">Loading Article Content...</h1>
                    <div class="flex items-center text-slate-400 text-xs font-medium space-x-2">
                        <span id="post-date"><i class="fa-regular fa-calendar mr-1"></i> Syncing...</span>
                        <span>•</span>
                        <span><i class="fa-regular fa-clock mr-1"></i> 5 min read</span>
                    </div>
                </div>

                <!-- Small/normal font weight body text wrapper -->
                <div id="post-content" class="text-slate-600 space-y-5 font-normal text-sm sm:text-base leading-relaxed">
                    <div class="text-center py-12 text-slate-300">
                        <i class="fa-solid fa-circle-notch fa-spin text-3xl text-blue-600 mb-4"></i>
                        <p class="text-slate-400 text-sm font-normal">Assembling analysis structure logs...</p>
                    </div>
                </div>
            </div>
        </article>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');

        fetch('blogs.json')
            .then(res => res.json())
            .then(blogs => {
                const post = blogs.find(b => b.id == postId);
                if(post) {
                    document.title = `${post.title} | Real estate Enthusiast`;
                    document.getElementById('post-title').innerText = post.title;
                    document.getElementById('post-category').innerText = post.category || "Market Update";
                    document.getElementById('post-date').innerHTML = `<i class="fa-regular fa-calendar mr-1"></i> Published ${post.date}`;
                    
                    const imgElement = document.getElementById('post-image');
                    imgElement.src = post.image;
                    imgElement.classList.remove('hidden');
                    document.getElementById('image-loader').classList.add('hidden');
                    
                    const rawLines = post.content.split('\n');
                    let htmlOutput = '';

                    rawLines.forEach(line => {
                        let cleanLine = line.trim();
                        if (!cleanLine) return;

                        if (cleanLine.startsWith('[') && cleanLine.endsWith(']')) {
                            let headingText = cleanLine.slice(1, -1);
                            htmlOutput += `<h2 class="text-base sm:text-lg font-bold text-slate-900 mt-8 mb-2 tracking-tight">${headingText}</h2>`;
                        } else {
                            htmlOutput += `<p class="text-slate-600 text-sm sm:text-base font-normal leading-relaxed mb-4">${cleanLine}</p>`;
                        }
                    });
                        
                    document.getElementById('post-content').innerHTML = htmlOutput;
                }
            }).catch(err => console.error("Error drawing elements:", err));
    </script>
</body>
</html>
