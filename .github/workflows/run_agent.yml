name: Automated Real Estate Blog Pipeline

on:
  repository_dispatch:
    types: [trigger_pipeline]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Your Repository Files
        uses: actions/checkout@v4

      - name: Configure Execution Node Env Environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Script Dependencies
        run: |
          npm init -y
          npm pkg set type="module"
          npm install groq-sdk axios cheerio

      - name: Run the Blog Agent Script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node agent.js

      - name: Save the New Article Back to Repository
        run: |
          git config --global user.name 'Edmund Blog Automation'
          git config --global user.email 'agent@edmundblog.local'
          
          # Strictly stage only the single data register file
          git add blogs.json
          
          if git diff --staged --quiet; then
            echo "No changes found to process."
          else
            git commit -m "Auto-published blog post: $(date +'%Y-%m-%d') [skip ci]"
            git push origin main
          fi
