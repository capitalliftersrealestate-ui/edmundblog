name: Automated Real Estate Blog Pipeline

on:
  repository_dispatch:
    types: [trigger-pipeline]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code Repository
        uses: actions/checkout@v4

      - name: Configure Execution Node Env Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Script Dependencies
        run: |
          npm init -y
          npm pkg set type="module"
          npm install groq-sdk

      - name: Run the Blog Agent Script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node agent.js

      - name: Save the New Article Back to Repository
        run: |
          git config --global user.name 'Edmund Blog Automation'
          git config --global user.email 'Edmund.initiative@gmail.com'
          
          # Explicitly stage only the updated database ledger file
          git add blogs.json
          
          # Commit and push only if changes were actually made
          if git diff --staged --quiet; then
            echo "No new changes found to process."
          else
            git commit -m "Automated update: Added new property insights [skip ci]"
            git push origin main
          fi
